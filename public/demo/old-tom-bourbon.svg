  <text x="138" y="1142" fill="#17110f" font-family="Arial, sans-serif" font-size="19" font-weight="700">GOVERNMENT WARNING:</text>
  <text x="138" y="1174" fill="#17110f" font-family="Arial, sans-serif" font-size="17">(1) According to the Surgeon General, women should not drink alcoholic beverages during pregnancy because</text>
